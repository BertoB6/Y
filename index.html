<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZonaXP - Jogo Grátis</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
    body { background:#0d0d0d; color:#fff; line-height:1.6; }
    header {
      display:flex; align-items:center; justify-content:center;
      padding:30px 20px;
      background: linear-gradient(90deg, #ff0000, #8b00ff);
      position: sticky; top:0; z-index:1000;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }
    header img { width:60px; height:60px; margin-right:15px; transition: transform 0.3s; }
    header img:hover { transform: rotate(15deg); }
    header h1 { font-size:2rem; color:#fff; text-shadow:2px 2px 5px rgba(0,0,0,0.7); }
    .hero { text-align:center; padding:80px 20px; background: linear-gradient(to bottom, #1a1a1a, #2a2a2a); animation: fadeIn 1.5s ease-in-out; }
    .hero h2 { font-size:2rem; color:#ff0000; margin-bottom:15px; text-shadow:1px 1px 3px rgba(0,0,0,0.7); }
    .hero p { font-size:1.2rem; color:#ccc; max-width:700px; margin:0 auto 30px auto; }
    .hero a {
      display:inline-block; padding:15px 30px; font-size:1.1rem;
      color:#fff; background:#8b00ff; border-radius:50px;
      text-decoration:none; transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .hero a:hover { background:#ff0000; transform:scale(1.05); box-shadow:0 8px 20px rgba(0,0,0,0.6); }
    footer { text-align:center; padding:30px 20px; background:#111; color:#888; font-size:0.9rem; border-top:2px solid #8b00ff; }
    @keyframes fadeIn { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
    @media (max-width:768px){ header h1{ font-size:1.5rem; } .hero h2{ font-size:1.5rem; } .hero p{ font-size:1rem; } }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="ZonaXP Logo">
  <h1>ZonaXP</h1>
</header>

<section class="hero">
  <h2>🎮 Recebe o teu Jogo Grátis Agora! 🎮</h2>
  <p>
    Estamos a distribuir gratuitamente **um dos jogos mais jogados na Moçambique**!  
    Clique no botão abaixo e receba o jogo direto no seu WhatsApp.  
    Leva menos de 2 minutos para garantir o seu.
  </p>
  <!-- Botão que será linkado ao formulário -->
  <a href="jogos.html" target="_blank">Receber Jogo Grátis</a>
</section>

<footer>
  &copy; 2026 ZonaXP - Todos os direitos reservados
</footer>

</body>
</html>
